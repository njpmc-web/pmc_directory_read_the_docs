<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PMC documentation fixture</title>
  <style>
    :root{--blue:#0077bd;--sky:#e7f6ff;--ink:#0f172a;--muted:#64748b;--line:#dbe4ea;--bg:#f2f5f9;--white:#fff;--amber:#fff9e8;--red:#fff1f2;--green:#ecfdf5}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Segoe UI",sans-serif;font-weight:650}.wrap{padding:32px 5.5%;min-height:100vh}.mobile{max-width:480px;margin:auto;padding:32px 20px;min-height:100vh}.brand{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;object-fit:contain}.eyebrow{margin:0;color:var(--blue);font-size:14px;font-weight:900}.brand h1{margin:2px 0 0;font-size:24px}.card{background:#fff;border:1px solid var(--line);border-radius:25px;padding:22px;box-shadow:0 2px 5px #0f172a10}.stack{display:flex;flex-direction:column;gap:16px}.mt{margin-top:22px}.muted{color:var(--muted)}.small{font-size:13px}.title{font-size:25px;margin:4px 0}.btn{background:var(--blue);color:#fff;border-radius:16px;padding:15px;text-align:center;font-weight:900}.input{border:1px solid #b8c5d1;background:#fff;border-radius:16px;padding:15px}.outline{border:1px solid #c9d2db;border-radius:13px;padding:10px 14px;text-align:center}.avatar{width:66px;height:66px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#a9e1ff,#2688ef);color:#fff;font-weight:900;font-size:18px;flex:none}.avatar.big{width:128px;height:128px;font-size:30px}.person{display:flex;gap:15px;align-items:center}.person p{margin:2px 0}.details{display:grid;gap:12px;margin-top:18px}.details b{display:block;margin-top:2px}.tag{display:inline-block;border-radius:999px;padding:7px 12px;background:#eef2f7;font-size:12px;font-weight:900}.tag.active{background:var(--blue);color:#fff}.tag.warn{background:var(--amber);color:#92400e}.tag.good{background:var(--green);color:#047857}.tag.bad{background:var(--red);color:#b91c1c}.admin-head{display:flex;align-items:center;justify-content:space-between;gap:20px}.nav{display:flex;gap:8px}.nav span{background:#fff;color:var(--blue);padding:11px 16px;border-radius:999px;font-size:13px;font-weight:900}.nav .active{background:var(--blue);color:#fff}.grid{display:grid;grid-template-columns:360px 1fr;gap:20px;margin-top:28px}.grid.equal{grid-template-columns:1fr 1fr}.candidate{border:1px solid var(--line);border-radius:18px;padding:16px;margin-top:12px}.candidate.selected{border:2px solid #00a5d8;background:#f0fbff}.row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.soft{background:#f8fafc;border-radius:18px;padding:16px}.notice{background:var(--amber);border:1px solid #f4df8a;border-radius:18px;padding:18px;margin-top:18px;color:#854d0e}.table{width:100%;border-collapse:collapse;margin-top:20px}.table th,.table td{text-align:left;padding:15px;border-bottom:1px solid #edf1f4;font-size:14px}.table th{color:var(--muted)}.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}.role{background:#f8fafc;border-radius:18px;padding:20px}.role h3{color:var(--blue)}@media(max-width:700px){.admin-head{align-items:flex-start}.nav{display:none}.grid,.grid.equal,.member-grid,.role-grid{grid-template-columns:1fr}.wrap{padding:24px 18px}}
  </style>
</head>
<body><div id="app"></div>
<script>
const $=s=>document.querySelector(s);const members=[['김하늘','Haneul Kim','(201) 555-0101','haneul@example.test'],['이사랑','Sarang Lee','(201) 555-0102','sarang@example.test']];
const brand=a=>`<header class="brand"><img class="logo" src="../docs/assets/PMC_logo_icon.png" alt="PMC logo"><div><p class="eyebrow">PMC 교인 정보 확인</p><h1>${a?'Admin':'우리 가족 정보'}</h1></div></header>`;
const avatar=n=>`<div class="avatar">${n.slice(-2)}</div>`;const person=m=>`<div class="person">${avatar(m[0])}<div><b>${m[0]}</b><p class="small muted">${m[1]}</p><p>${m[2]}</p></div></div>`;
const shell=(active,body)=>`<main class="wrap" data-docs-fixture="${active}"><div class="admin-head">${brand(true)}<nav class="nav">${['Member Search','Lookup','Requests','Login History','Permissions','Settings'].map(x=>`<span class="${x===active?'active':''}">${x}</span>`).join('')}</nav></div>${body}</main>`;
const requestRows=[['#1042','김하늘','휴대폰','접수'],['#1041','김하늘','영문 이름','반영 확인'],['#1040','가족','가족 사진','확인 중'],['#1039','이사랑','이메일','취소']];
function mobile(screen){if(screen==='member-login')return `<main class="mobile" data-docs-fixture="${screen}">${brand()}<section class="card mt"><p class="eyebrow">간편 로그인</p><h2 class="title">휴대폰으로 확인하기</h2><p class="muted">교적에 등록된 번호로 6자리 인증번호를 받습니다.</p><div class="stack mt"><b class="small">휴대폰 번호</b><div class="input">(201) 555-0101</div><div class="btn">인증번호 받기</div><p class="eyebrow" style="text-align:center">이메일로 로그인</p></div></section><div class="notice">등록되지 않은 번호인가요? 관리자 확인 요청을 선택하세요.</div></main>`;
if(screen==='member-requests')return `<main class="mobile" data-docs-fixture="${screen}">${brand()}<h2 class="title mt">요청 내역</h2><p class="muted">수정 요청의 처리 단계와 상세 내용을 확인합니다.</p><div class="stack mt">${requestRows.map((r,i)=>`<article class="card"><div class="row"><div><b>${r[1]} · ${r[2]}</b><p class="eyebrow small">Request ${r[0]}</p></div><span class="tag ${i===1?'good':i===3?'bad':'warn'}">${r[3]}</span></div><p class="muted small">변경 전 값 → 요청한 새 값</p><span class="outline small">상세 보기</span></article>`).join('')}</div></main>`;
const edit=screen==='member-edit';return `<main class="mobile" data-docs-fixture="${screen}">${brand()}<section class="card mt"><div class="person"><div class="avatar big">하늘</div><div><p class="eyebrow">대표 가족</p><h2 class="title">김하늘 가정</h2><p class="muted small">100 Sample Road, Palisades Park, NJ 07650</p></div></div></section><div class="stack mt">${members.map((m,i)=>`<section class="card">${person(m)}<div class="details"><div><span class="muted small">휴대폰</span><b>${m[2]}</b></div><div><span class="muted small">이메일</span><b>${m[3]}</b></div></div>${edit&&i===0?`<div class="soft mt"><b class="eyebrow">영문 이름 수정</b><div class="input mt">Haneul Kim</div><p class="small muted">전화·이메일 변경은 제출 후 추가 인증이 필요합니다.</p><div class="btn">수정 요청 보내기</div></div>`:`<div class="outline mt">정보 수정</div>`}</section>`).join('')}</div></main>`}
function admin(screen){if(screen==='admin-login')return `<main class="mobile" data-docs-fixture="${screen}" style="display:flex;flex-direction:column;justify-content:center">${brand(true)}<section class="card mt"><h2 class="title">관리자 로그인</h2><p class="muted">승인된 PMC Google 계정으로 로그인하세요.</p><div class="outline mt">G &nbsp; Google로 계속</div></section></main>`;
if(screen==='admin-search')return shell('Member Search',`<div class="grid"><section class="card"><h2>교인 검색</h2><span class="tag active">이름</span> <span class="tag">전화번호</span><div class="input mt">김하늘</div><div class="btn mt">검색</div><div class="candidate selected"><b>김하늘</b><p class="muted small">Palisades Park, NJ · 0101</p></div></section><section class="card"><h2>김하늘 가정</h2><p class="muted">가족 정보와 접수된 수정 요청</p><div class="member-grid">${members.map(m=>`<div class="soft">${person(m)}</div>`).join('')}</div><div class="notice"><b>Request #1042 · 휴대폰 변경</b><p>관리자 검토 대기 중</p></div></section></div>`);
if(screen==='admin-lookup')return shell('Lookup',`<div class="grid" style="grid-template-columns:1fr 420px"><section class="card"><p class="eyebrow">미등록 번호 요청 #NL-208</p><h2 class="title">후보 교인 연결</h2><p class="muted">요청자 입력: 김하늘 · (201) 555-0199</p><div class="candidate selected"><div class="row"><b>김하늘</b><span class="tag">가장 유력</span></div><p class="muted">Palisades Park, NJ · 끝자리 0101</p></div><div class="candidate"><div class="row"><b>김하늘</b><span class="tag">검토 필요</span></div><p class="muted">Fort Lee, NJ · 끝자리 0188</p></div></section><aside class="card"><h2>검토 결과</h2><p class="muted">가족 관계와 요청자 정보를 확인한 뒤 처리합니다.</p><div class="btn mt">연결하고 승인</div><div class="outline mt">요청 반려</div></aside></div>`);
if(screen==='admin-settings')return shell('Settings',`<div class="grid equal"><section class="card"><h2>사진 표시 설정</h2><p class="muted">회원 및 관리자 화면에 교인 사진을 표시합니다.</p><div class="soft row mt"><b>교인 사진 표시</b><span class="tag good">켜짐</span></div></section><section class="card"><h2>사진 저장공간</h2><h3 style="font-size:32px">284.6 MB</h3><p class="muted">파일 126개 · 최근 확인 방금 전</p></section></div>`);
if(screen==='admin-permissions')return shell('Permissions',`<section class="card mt"><h2>관리자 권한</h2><p class="muted">역할별 메뉴 접근 범위를 관리합니다.</p><div class="role-grid">${[['Super Admin','모든 관리 기능','2명'],['Pastor','교인 검색','3명'],['Lookup Admin','미등록 번호 검토','3명']].map(r=>`<div class="role"><h3>${r[0]}</h3><p class="muted">${r[1]}</p><h3>${r[2]}</h3><div class="outline">사용자 관리</div></div>`).join('')}</div></section>`);
const history=screen==='admin-history';const rows=history?[['2026. 7. 17. 09:42','김하늘','SMS','로그인 성공'],['2026. 7. 17. 09:35','이사랑','Email','로그인 성공'],['2026. 7. 17. 09:11','김하늘','SMS','인증 실패']]:requestRows;return shell(history?'Login History':'Requests',`<section class="card mt"><div class="row"><div><h2>${history?'로그인 기록':'수정 요청 목록'}</h2><p class="muted">상태와 상세 내용을 확인하세요.</p></div><div class="input">검색 및 필터</div></div><table class="table"><thead><tr>${(history?['시간','교인','채널','결과']:['요청','교인','항목','상태']).map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></section>`)}
const screen=new URLSearchParams(location.search).get('screen')||'member-login';$('#app').innerHTML=screen.startsWith('member-')?mobile(screen):admin(screen);
</script></body></html>
